<app-header [isDarkMode]="isDarkMode" (themeToggled)="toggleTheme()"></app-header>

<div class="course-details-page">
  <app-course-hero [course]="course"></app-course-hero>

  <div class="container my-5">
    <div class="row">
      <!-- Main Content Area -->
      <div class="col-12 col-lg-8">
        <div class="learn-card border-0 mb-5 p-4 rounded-4">
          <h4 class="fw-bold mb-4">What you'll learn</h4>
          <div class="row g-3">
            <div class="col-md-6 d-flex gap-3" *ngFor="let item of learningPoints">
              <i class="fas fa-check mt-1" style="color: var(--primary-color);"></i>
              <span>{{ item }}</span>
            </div>
          </div>
        </div>

        <section class="mb-5">
          <h4 class="fw-bold mb-3">Requirements</h4>
          <ul class="d-flex flex-column gap-2 ps-3">
            <li *ngFor="let req of requirements">{{ req }}</li>
          </ul>
        </section>

        <section class="mb-5">
          <h4 class="fw-bold mb-3">Description</h4>
          <div class="description-content" [innerHTML]="course?.description || defaultDescription"></div>
        </section>
        
        <app-course-content [sections]="course?.sections || dummySections"></app-course-content>
        
        <app-course-instructor [course]="course"></app-course-instructor>
        
        <app-course-reviews [reviews]="course?.reviews || dummyReviews"></app-course-reviews>
      </div>

      <!-- Sticky Sidebar Area (Desktop only) -->
      <div class="col-12 col-lg-4 d-none d-lg-block position-relative">
        <div class="sticky-top" style="top: 2rem;">
          <app-course-sidebar [course]="course"></app-course-sidebar>
        </div>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
