<app-header [isDarkMode]="isDarkMode" (themeToggled)="toggleTheme()"></app-header>

<div class="course-details-page">
  <app-course-hero [course]="course"></app-course-hero>

  <div class="container my-5">
    <div class="row">
      <!-- Main Content Area -->
      <div class="col-12 col-lg-8">
        <!-- What You'll Learn -->
        <div class="learn-card border-0 mb-5 p-4 rounded-4 shadow-sm" *ngIf="learningPoints && learningPoints.length > 0">
          <h4 class="fw-bold mb-4">What you'll learn</h4>
          <div class="row g-3">
            <div class="col-md-6 d-flex gap-3" *ngFor="let item of learningPoints">
              <i class="fas fa-check mt-1" style="color: var(--primary-color);"></i>
              <span class="opacity-90">{{ item }}</span>
            </div>
          </div>
        </div>

        <!-- Requirements -->
        <section class="mb-5" *ngIf="requirements && requirements.length > 0">
          <h4 class="fw-bold mb-4">Requirements</h4>
          <div class="requirements-list">
            <div class="d-flex align-items-start gap-3 mb-3" *ngFor="let req of requirements">
              <i class="fas fa-circle mt-2" style="font-size: 6px; color: var(--text-muted);"></i>
              <span class="opacity-90">{{ req }}</span>
            </div>
          </div>
        </section>

        <section class="mb-5">
          <h4 class="fw-bold mb-3">Description</h4>
          <div class="description-content" [innerHTML]="course?.description || defaultDescription"></div>
        </section>
        
        <app-course-content 
          [sections]="sections" 
          [totalSections]="totalSections"
          [loading]="sectionsLoading"
          [hasMore]="hasMoreSections"
          [loadingContentSectionIds]="loadingContentSectionIds"
          (loadMore)="loadMoreSections()"
          (sectionOpened)="loadSectionContents($event)"
          (contentSelected)="handleContentSelected($event)">
        </app-course-content>
        
        <app-course-instructor [course]="course"></app-course-instructor>
        
        <app-course-reviews [reviews]="reviews" [course]="course"></app-course-reviews>
      </div>

      <!-- Sticky Sidebar Area (Desktop only) -->
      <div class="col-12 col-lg-4 d-none d-lg-block position-relative">
        <div class="sticky-top" style="top: 2rem;">
          <app-course-sidebar [course]="course"></app-course-sidebar>
        </div>
      </div>
    </div>
  </div>
</div>


<app-footer></app-footer>

<router-outlet></router-outlet>
