<div class="course-card">
  <div class="course-image">
    <img [src]="course.pictureUrl" [alt]="course.title">
    <span class="tag">{{ course.category }}</span>
  </div>
  <div class="course-content">
    <div class="course-meta">
      <span class="instructor">{{ course.instructorName }}</span>
      <div class="rating">
        <i class="fa-solid fa-star"></i>
        <span>{{ course.averageRate }}</span>
        <span class="reviews">({{ course.totalReviews }})</span>
      </div>
      <span class="language-badge">
        <i class="fa-solid fa-globe"></i> {{ course.language }}
      </span>
    </div>
    <h3 class="course-title">{{ course.title }}</h3>
    <div class="course-footer">
      <div class="price-container d-flex align-items-center gap-2">
        <span class="price fw-bold">${{ course.priceAfterDiscount }}</span>
        <span *ngIf="course.cost > course.priceAfterDiscount" class="text-muted small text-decoration-line-through">${{ course.cost }}</span>
      </div>
      <div class="d-flex gap-2">
        <button class="btn-enroll" [routerLink]="['/courses', course.id]">
          <i class="fa-solid fa-eye"></i>
        </button>
        <button class="btn-enroll">
          <i class="fa-solid fa-cart-plus"></i>
        </button>
      </div>
    </div>
  </div>
</div>
