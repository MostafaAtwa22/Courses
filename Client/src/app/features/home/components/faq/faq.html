<section class="faq container">
  <div class="section-header">
    <h2>Frequently Asked Questions</h2>
    <p>Everything you need to know about our platform</p>
  </div>
  <div class="faq-list">
    <div class="faq-item" *ngFor="let faq of faqs; let i = index" [class.open]="faq.isOpen">
      <div class="faq-question" (click)="onToggleFaq(i)">
        <h3>{{ faq.question }}</h3>
        <span class="faq-toggle">
          <i class="fa-solid" [class.fa-plus]="!faq.isOpen" [class.fa-minus]="faq.isOpen"></i>
        </span>
      </div>
      <div class="faq-answer">
        <p>{{ faq.answer }}</p>
      </div>
    </div>
  </div>
</section>
