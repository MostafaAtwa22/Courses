<section class="categories container">
  <div class="section-header">
    <h2>Top Categories</h2>
    <p>Explore our most popular fields of study</p>
  </div>
  <div class="slider-container">
    <div class="slider-track">
      <!-- Original items -->
      <div class="category-card" *ngFor="let cat of categories">
        <div class="cat-icon">
          <i [class]="cat.icon"></i>
        </div>
        <h3>{{ cat.name }}</h3>
        <span>{{ cat.numberOfCourses }}+ Courses</span>
      </div>
      <!-- Duplicated items for seamless loop -->
      <div class="category-card" *ngFor="let cat of categories">
        <div class="cat-icon">
          <i [class]="cat.icon"></i>
        </div>
        <h3>{{ cat.name }}</h3>
        <span>{{ cat.numberOfCourses }}+ Courses</span>
      </div>
    </div>
  </div>
</section>
