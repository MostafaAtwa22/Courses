<div class="auth-card">

  <div class="auth-header">
    <h2>Welcome Back</h2>
    <p>Please enter your details to sign in.</p>
  </div>

  <!-- Success banner (after password reset) -->
  <div *ngIf="authState.success" class="banner success-banner">
    <i class="fa-solid fa-circle-check"></i>
    {{ authState.success }}
  </div>

  <!-- Error banner -->
  <div *ngIf="authState.error" class="banner error-banner">
    <i class="fa-solid fa-circle-exclamation"></i>
    {{ authState.error }}
  </div>

  <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input type="email" id="email" formControlName="email" placeholder="name@company.com" autocomplete="email"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
      </div>
      <span class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <ng-container *ngIf="loginForm.get('email')?.hasError('required')">Email is required.</ng-container>
        <ng-container *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email
          address.</ng-container>
      </span>
    </div>

    <!-- Password -->
    <div class="form-group">
      <div class="label-row">
        <label for="password">Password</label>
        <a routerLink="/auth/forget-password" class="forgot-link">Forgot password?</a>
      </div>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock input-icon"></i>
        <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
          placeholder="••••••••" autocomplete="current-password"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
        <button type="button" class="toggle-visibility" (click)="showPassword = !showPassword" tabindex="-1"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
          <i class="fa-solid" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
        </button>
      </div>
      <span class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        Password is required.
      </span>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-primary btn-block" [disabled]="authState.loading">
      <i class="fa-solid fa-circle-notch fa-spin" *ngIf="isEmailLoading"></i>
      <span>{{ isEmailLoading ? 'Signing in…' : 'Sign In' }}</span>
    </button>

    <!-- Divider -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- Social login row -->
    <div class="social-row">

      <!-- Google: wrapper clips the SDK-rendered button to match other social buttons -->
      <div class="social-btn-wrapper social-btn-wrapper--google" #googleButton></div>

      <!-- Facebook -->
      <button type="button" class="social-btn social-btn--facebook" (click)="handleFacebookLogin()"
        [disabled]="authState.loading" aria-label="Continue with Facebook" title="Continue with Facebook">
        <i class="fa-solid fa-circle-notch fa-spin" *ngIf="isFacebookLoading; else facebookIcon"></i>
        <ng-template #facebookIcon>
          <i class="fa-brands fa-facebook-f social-icon"></i>
        </ng-template>
      </button>

      <!-- Github -->
      <button type="button" class="social-btn social-btn--github" (click)="handleGithubLogin()"
        [disabled]="authState.loading" aria-label="Continue with Github" title="Continue with Github">
        <i class="fa-solid fa-circle-notch fa-spin" *ngIf="isGithubLoading; else githubIcon"></i>
        <ng-template #githubIcon>
          <i class="fa-brands fa-github social-icon" style="color: #333;"></i>
        </ng-template>
      </button>

    </div>

  </form>

  <div class="auth-footer">
    <p>Don't have an account? <a routerLink="/auth/role-select">Sign up for free</a></p>
  </div>

</div>
