<div class="auth-card">

  <div class="auth-header">
    <h2>Welcome Back</h2>
    <p>Please enter your details to sign in.</p>
  </div>

  <!-- Success banner (after password reset) -->
  <div *ngIf="authState.success" class="banner success-banner">
    <i class="fa-solid fa-circle-check"></i>
    {{ authState.success }}
  </div>

  <!-- Error banner -->
  <div *ngIf="authState.error" class="banner error-banner">
    <i class="fa-solid fa-circle-exclamation"></i>
    {{ authState.error }}
  </div>

  <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="name@company.com"
          autocomplete="email"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
      </div>
      <span class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <ng-container *ngIf="loginForm.get('email')?.hasError('required')">Email is required.</ng-container>
        <ng-container *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email address.</ng-container>
      </span>
    </div>

    <!-- Password -->
    <div class="form-group">
      <div class="label-row">
        <label for="password">Password</label>
        <a routerLink="/auth/forget-password" class="forgot-link">Forgot password?</a>
      </div>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock input-icon"></i>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <button type="button" class="toggle-visibility" (click)="showPassword = !showPassword" tabindex="-1" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
          <i class="fa-solid" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
        </button>
      </div>
      <span class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        Password is required.
      </span>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-primary btn-block" [disabled]="authState.loading">
      <i class="fa-solid fa-circle-notch fa-spin" *ngIf="isEmailLoading"></i>
      <span>{{ isEmailLoading ? 'Signing in…' : 'Sign In' }}</span>
    </button>

    <!-- Divider -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- Social login row -->
    <div class="social-row">

      <!-- Google (hidden SDK target + custom button) -->
      <div #googleButton class="google-button-hidden"></div>
      <button
        type="button"
        class="social-btn social-btn--google"
        (click)="triggerGoogleLogin()"
        [disabled]="authState.loading"
        aria-label="Continue with Google"
        title="Continue with Google"
      >
        <i class="fa-solid fa-circle-notch fa-spin" *ngIf="isGoogleLoading; else googleIcon"></i>
        <ng-template #googleIcon>
          <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </ng-template>
      </button>

      <!-- Facebook -->
      <button
        type="button"
        class="social-btn social-btn--facebook"
        (click)="handleFacebookLogin()"
        [disabled]="authState.loading"
        aria-label="Continue with Facebook"
        title="Continue with Facebook"
      >
        <i class="fa-solid fa-circle-notch fa-spin" *ngIf="isFacebookLoading; else facebookIcon"></i>
        <ng-template #facebookIcon>
          <i class="fa-brands fa-facebook-f social-icon"></i>
        </ng-template>
      </button>

      <!-- Microsoft -->
      <button
        type="button"
        class="social-btn social-btn--microsoft"
        (click)="handleMicrosoftLogin()"
        [disabled]="authState.loading"
        aria-label="Continue with Microsoft"
        title="Continue with Microsoft"
      >
        <i class="fa-solid fa-circle-notch fa-spin" *ngIf="isMicrosoftLoading; else microsoftIcon"></i>
        <ng-template #microsoftIcon>
          <svg class="social-icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="1"  y="1"  width="10" height="10" fill="#F25022"/>
            <rect x="12" y="1"  width="10" height="10" fill="#7FBA00"/>
            <rect x="1"  y="12" width="10" height="10" fill="#00A4EF"/>
            <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
          </svg>
        </ng-template>
      </button>

    </div>

  </form>

  <div class="auth-footer">
    <p>Don't have an account? <a routerLink="/auth/role-select">Sign up for free</a></p>
  </div>

</div>
