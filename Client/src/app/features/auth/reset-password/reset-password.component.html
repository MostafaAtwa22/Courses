<div class="auth-card">
  <div class="auth-header">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>
  </div>

  <!-- Error banner -->
  <div *ngIf="errorMessage" class="server-error">
    <i class="fa-solid fa-circle-exclamation"></i>
    {{ errorMessage }}
  </div>

  <form class="auth-form" [formGroup]="resetForm" (ngSubmit)="onSubmit()">

    <!-- New Password -->
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="newPassword"
          formControlName="newPassword"
          placeholder="••••••••"
        />
        <button type="button" class="toggle-visibility" (click)="showPassword = !showPassword" tabindex="-1">
          <i class="fa-solid" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
        </button>
      </div>

      <!-- Strength bar -->
      <div class="strength-meter" *ngIf="showPasswordStrength">
        <div class="strength-segments">
          <div
            class="segment"
            *ngFor="let i of [0,1,2,3,4]"
            [class.filled]="passwordScore > i"
            [class]="'segment ' + (passwordScore > i ? passwordStrengthClass : '')"
          ></div>
        </div>
        <span class="strength-label" [class]="passwordStrengthClass">{{ passwordStrengthLabel }}</span>
      </div>

      <!-- Conditions checklist -->
      <ul class="password-conditions" *ngIf="showPasswordStrength">
        <li *ngFor="let c of passwordConditions" [class.met]="c.met">
          <i class="fa-solid" [class.fa-circle-check]="c.met" [class.fa-circle]="!c.met"></i>
          {{ c.label }}
        </li>
      </ul>

      <span class="field-error" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
        <ng-container *ngIf="resetForm.get('newPassword')?.errors?.['required']">Password is required.</ng-container>
        <ng-container *ngIf="resetForm.get('newPassword')?.errors?.['minlength']">Password must be at least 8 characters.</ng-container>
      </span>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label for="confirmNewPassword">Confirm New Password</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          id="confirmNewPassword"
          formControlName="confirmNewPassword"
          placeholder="••••••••"
        />
        <button type="button" class="toggle-visibility" (click)="showConfirmPassword = !showConfirmPassword" tabindex="-1">
          <i class="fa-solid" [class.fa-eye]="!showConfirmPassword" [class.fa-eye-slash]="showConfirmPassword"></i>
        </button>
      </div>
      <span class="field-error" *ngIf="resetForm.get('confirmNewPassword')?.touched && resetForm.get('confirmNewPassword')?.errors?.['passwordMismatch']">
        Passwords do not match.
      </span>
    </div>

    <button type="submit" class="btn-primary btn-block" [disabled]="isLoading">
      <span *ngIf="isLoading"><i class="fa-solid fa-circle-notch fa-spin"></i> Resetting...</span>
      <span *ngIf="!isLoading">Reset Password</span>
    </button>
  </form>

  <div class="auth-footer">
    <p><a routerLink="/auth/login">Back to Login</a></p>
  </div>
</div>
