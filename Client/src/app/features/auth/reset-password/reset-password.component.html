<div class="auth-card">
  <div class="auth-header">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <form class="auth-form" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="newPassword" formControlName="newPassword" placeholder="••••••••">
      </div>
      <p class="input-hint">Must be at least 8 characters long.</p>
    </div>

    <div class="form-group">
      <label for="confirmNewPassword">Confirm New Password</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="confirmNewPassword" formControlName="confirmNewPassword" placeholder="••••••••">
      </div>
      <div class="field-error" *ngIf="resetForm.get('confirmNewPassword')?.hasError('passwordMismatch') && resetForm.get('confirmNewPassword')?.touched">
        Passwords do not match.
      </div>
    </div>

    <button type="submit" class="btn-primary btn-block" [disabled]="isLoading">
      <span *ngIf="isLoading"><i class="fa-solid fa-circle-notch fa-spin"></i> Resetting...</span>
      <span *ngIf="!isLoading">Reset Password</span>
    </button>
  </form>

  <div class="auth-footer">
    <p><a routerLink="/auth/login">Back to Login</a></p>
  </div>
</div>
