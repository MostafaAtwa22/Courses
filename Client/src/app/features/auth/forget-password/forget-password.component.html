<div class="auth-card">
  <div class="auth-header">
    <h2>Forgot Password</h2>
    <p>Enter your email address to receive a password reset link.</p>
  </div>

  <div *ngIf="successMessage" class="alert alert-success mb-4 p-3 rounded" style="background-color: #dcfce7; color: #15803d; border: 1px solid #86efac;">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger mb-4 p-3 rounded" style="background-color: #fee2e2; color: #b91c1c; border: 1px solid #f87171;">
    {{ errorMessage }}
  </div>

  <form *ngIf="!successMessage" class="auth-form" [formGroup]="forgetForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" formControlName="email" placeholder="name@company.com">
      </div>
    </div>

    <button type="submit" class="btn-primary btn-block" [disabled]="isLoading">
      <span *ngIf="isLoading"><i class="fa-solid fa-circle-notch fa-spin"></i> Sending...</span>
      <span *ngIf="!isLoading">Send Reset Link</span>
    </button>
  </form>
  
  <div class="auth-footer mt-4 text-center">
    <p><a routerLink="/auth/login">Back to Login</a></p>
  </div>
</div>
